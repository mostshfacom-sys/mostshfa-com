<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="drugBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="100%" style="stop-color:#fbcfe8"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#drugBg)"/>
  
  <!-- Large Pill -->
  <rect x="120" y="100" width="160" height="60" fill="url(#pillGrad)" rx="30"/>
  <line x1="200" y1="100" x2="200" y2="160" stroke="white" stroke-width="2" opacity="0.5"/>
  
  <!-- Medicine Bottle -->
  <g transform="translate(80, 170)">
    <rect x="0" y="10" width="60" height="70" fill="#60a5fa" rx="4"/>
    <rect x="5" y="0" width="50" height="15" fill="#3b82f6" rx="2"/>
    <rect x="10" y="30" width="40" height="20" fill="white" rx="2"/>
    <text x="30" y="45" text-anchor="middle" fill="#3b82f6" font-size="10">Rx</text>
  </g>
  
  <!-- Capsules -->
  <g transform="translate(160, 180)">
    <rect x="0" y="0" width="40" height="18" fill="#ef4444" rx="9"/>
    <rect x="20" y="0" width="20" height="18" fill="#fbbf24" rx="9"/>
  </g>
  
  <g transform="translate(220, 190)">
    <rect x="0" y="0" width="40" height="18" fill="#8b5cf6" rx="9"/>
    <rect x="20" y="0" width="20" height="18" fill="#c4b5fd" rx="9"/>
  </g>
  
  <!-- Tablets -->
  <circle cx="300" cy="200" r="20" fill="#22c55e"/>
  <circle cx="300" cy="200" r="15" fill="#4ade80"/>
  
  <circle cx="340" cy="220" r="15" fill="#f97316"/>
  <circle cx="340" cy="220" r="10" fill="#fb923c"/>
  
  <!-- Syringe -->
  <g transform="translate(280, 100)">
    <rect x="0" y="15" width="80" height="20" fill="#e5e7eb" rx="2"/>
    <rect x="80" y="20" width="30" height="10" fill="#9ca3af" rx="1"/>
    <rect x="110" y="22" width="15" height="6" fill="#6b7280"/>
    <rect x="-10" y="18" width="15" height="14" fill="#d1d5db" rx="2"/>
    <rect x="10" y="20" width="40" height="10" fill="#60a5fa" opacity="0.5"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#f9a8d4"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">دواء</text>
</svg>