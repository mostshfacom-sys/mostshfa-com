<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="articleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#articleBg)"/>
  
  <!-- Main Document -->
  <g transform="translate(100, 40)">
    <!-- Paper Shadow -->
    <rect x="8" y="8" width="180" height="200" fill="#94a3b8" rx="4"/>
    
    <!-- Paper -->
    <rect x="0" y="0" width="180" height="200" fill="white" rx="4" stroke="#cbd5e1" stroke-width="2"/>
    
    <!-- Header Image Placeholder -->
    <rect x="15" y="15" width="150" height="60" fill="#0ea5e9" rx="4"/>
    <circle cx="90" cy="45" r="15" fill="white" opacity="0.3"/>
    <polygon points="60,60 90,35 120,60" fill="white" opacity="0.3"/>
    
    <!-- Title Lines -->
    <rect x="15" y="85" width="120" height="10" fill="#1e293b" rx="2"/>
    <rect x="15" y="100" width="80" height="8" fill="#64748b" rx="2"/>
    
    <!-- Content Lines -->
    <rect x="15" y="120" width="150" height="6" fill="#cbd5e1" rx="1"/>
    <rect x="15" y="132" width="140" height="6" fill="#cbd5e1" rx="1"/>
    <rect x="15" y="144" width="150" height="6" fill="#cbd5e1" rx="1"/>
    <rect x="15" y="156" width="100" height="6" fill="#cbd5e1" rx="1"/>
    
    <!-- Read More Button -->
    <rect x="15" y="175" width="60" height="15" fill="#0ea5e9" rx="3"/>
    <text x="45" y="186" text-anchor="middle" fill="white" font-size="8">اقرأ المزيد</text>
  </g>
  
  <!-- Decorative Elements -->
  <!-- Stethoscope -->
  <g transform="translate(300, 60)">
    <circle cx="0" cy="0" r="30" fill="#0ea5e9" opacity="0.2"/>
    <path d="M-10 -5 Q0 10 10 -5" stroke="#0284c7" stroke-width="3" fill="none"/>
    <circle cx="-10" cy="-5" r="4" fill="#0284c7"/>
    <circle cx="10" cy="-5" r="4" fill="#0284c7"/>
  </g>
  
  <!-- Heart -->
  <g transform="translate(320, 180)">
    <path d="M0 10 C0 -5 -15 -5 -15 5 C-15 15 0 25 0 25 C0 25 15 15 15 5 C15 -5 0 -5 0 10" fill="#ef4444" opacity="0.6"/>
  </g>
  
  <!-- Pills -->
  <g transform="translate(60, 200)">
    <rect x="0" y="0" width="30" height="12" fill="#22c55e" rx="6"/>
    <rect x="15" y="0" width="15" height="12" fill="#4ade80" rx="6"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#7dd3fc"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#0369a1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">مقال طبي</text>
</svg>