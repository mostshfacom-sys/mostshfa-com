<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="nursingBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8"/>
      <stop offset="100%" style="stop-color:#fce7f3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#nursingBg)"/>
  
  <!-- Nurse Figure -->
  <g transform="translate(200, 150)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="35" fill="#fcd34d"/>
    
    <!-- Face -->
    <circle cx="-10" cy="-65" r="4" fill="#1f2937"/>
    <circle cx="10" cy="-65" r="4" fill="#1f2937"/>
    <path d="M-8 -50 Q0 -45 8 -50" stroke="#1f2937" stroke-width="2" fill="none"/>
    
    <!-- Hair -->
    <ellipse cx="0" cy="-80" rx="30" ry="20" fill="#92400e"/>
    
    <!-- Nurse Cap -->
    <rect x="-25" y="-100" width="50" height="20" fill="white" rx="2"/>
    <rect x="-8" y="-105" width="16" height="8" fill="#ec4899" rx="1"/>
    <rect x="-3" y="-108" width="6" height="14" fill="#ec4899" rx="1"/>
    
    <!-- Body (Scrubs) -->
    <rect x="-40" y="-25" width="80" height="100" fill="#ec4899" rx="8"/>
    
    <!-- Scrubs Details -->
    <rect x="-30" y="-15" width="25" height="20" fill="#f472b6" rx="2"/>
    <rect x="5" y="-15" width="25" height="20" fill="#f472b6" rx="2"/>
    
    <!-- Clipboard -->
    <g transform="translate(50, 20)">
      <rect x="0" y="0" width="30" height="40" fill="#fbbf24" rx="2"/>
      <rect x="5" y="5" width="20" height="3" fill="white"/>
      <rect x="5" y="12" width="20" height="3" fill="white"/>
      <rect x="5" y="19" width="15" height="3" fill="white"/>
      <rect x="5" y="26" width="18" height="3" fill="white"/>
    </g>
    
    <!-- Heart Symbol -->
    <g transform="translate(-10, 30)">
      <path d="M10 5 C10 -5 0 -5 0 5 C0 -5 -10 -5 -10 5 C-10 15 10 25 10 25 C10 25 30 15 30 5 C30 -5 20 -5 20 5 C20 -5 10 -5 10 5" fill="#ef4444" transform="scale(0.6)"/>
    </g>
  </g>
  
  <!-- Medical Symbols -->
  <g transform="translate(80, 80)">
    <circle cx="0" cy="0" r="20" fill="#f9a8d4"/>
    <rect x="-3" y="-12" width="6" height="24" fill="white" rx="1"/>
    <rect x="-12" y="-3" width="24" height="6" fill="white" rx="1"/>
  </g>
  
  <!-- Syringe -->
  <g transform="translate(300, 100) rotate(30)">
    <rect x="0" y="0" width="50" height="12" fill="#e5e7eb" rx="2"/>
    <rect x="50" y="2" width="20" height="8" fill="#9ca3af" rx="1"/>
    <rect x="70" y="4" width="10" height="4" fill="#6b7280"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#f9a8d4"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#be185d" font-family="Arial, sans-serif" font-size="14" font-weight="bold">تمريض</text>
</svg>