<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="pharmacyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#pharmacyBg)"/>
  
  <!-- Pharmacy Building -->
  <rect x="100" y="100" width="200" height="150" fill="#059669" rx="8"/>
  
  <!-- Sign Board -->
  <rect x="130" y="70" width="140" height="40" fill="#10b981" rx="6"/>
  <text x="200" y="97" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="bold">صيدلية</text>
  
  <!-- Rx Symbol -->
  <circle cx="200" cy="145" r="25" fill="white"/>
  <text x="200" y="153" text-anchor="middle" fill="#059669" font-family="serif" font-size="24" font-weight="bold">℞</text>
  
  <!-- Shelves with Medicine -->
  <rect x="120" y="180" width="70" height="50" fill="#34d399" rx="4"/>
  <rect x="210" y="180" width="70" height="50" fill="#34d399" rx="4"/>
  
  <!-- Medicine Bottles -->
  <rect x="130" y="190" width="15" height="30" fill="#fbbf24" rx="2"/>
  <rect x="150" y="195" width="15" height="25" fill="#f87171" rx="2"/>
  <rect x="170" y="188" width="12" height="32" fill="#60a5fa" rx="2"/>
  
  <rect x="220" y="192" width="15" height="28" fill="#a78bfa" rx="2"/>
  <rect x="240" y="188" width="15" height="32" fill="#34d399" rx="2"/>
  <rect x="260" y="195" width="12" height="25" fill="#fb923c" rx="2"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#6ee7b7"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#047857" font-family="Arial, sans-serif" font-size="14" font-weight="bold">صيدلية</text>
</svg>