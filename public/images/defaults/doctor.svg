<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="doctorBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfeff"/>
      <stop offset="100%" style="stop-color:#cffafe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#doctorBg)"/>
  
  <!-- Doctor Figure -->
  <g transform="translate(200, 150)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="35" fill="#fcd34d"/>
    
    <!-- Face -->
    <circle cx="-10" cy="-65" r="4" fill="#1f2937"/>
    <circle cx="10" cy="-65" r="4" fill="#1f2937"/>
    <path d="M-8 -50 Q0 -45 8 -50" stroke="#1f2937" stroke-width="2" fill="none"/>
    
    <!-- Hair -->
    <path d="M-30 -75 Q-35 -95 0 -100 Q35 -95 30 -75" fill="#374151"/>
    
    <!-- Body (White Coat) -->
    <rect x="-40" y="-25" width="80" height="100" fill="white" rx="8"/>
    
    <!-- Coat Details -->
    <line x1="0" y1="-25" x2="0" y2="75" stroke="#e5e7eb" stroke-width="2"/>
    <rect x="-30" y="-15" width="20" height="15" fill="#f3f4f6" rx="2"/>
    <rect x="10" y="-15" width="20" height="15" fill="#f3f4f6" rx="2"/>
    
    <!-- Stethoscope -->
    <path d="M-15 -20 Q-25 10 -20 30" stroke="#0891b2" stroke-width="4" fill="none"/>
    <path d="M15 -20 Q25 10 20 30" stroke="#0891b2" stroke-width="4" fill="none"/>
    <circle cx="-20" cy="30" r="8" fill="#0891b2"/>
    <circle cx="20" cy="30" r="8" fill="#0891b2"/>
    <path d="M-20 38 Q0 60 20 38" stroke="#0891b2" stroke-width="4" fill="none"/>
    <circle cx="0" cy="55" r="12" fill="#06b6d4"/>
    
    <!-- Name Tag -->
    <rect x="-25" y="45" width="50" height="20" fill="#0891b2" rx="3"/>
    <text x="0" y="59" text-anchor="middle" fill="white" font-size="8">طبيب</text>
  </g>
  
  <!-- Medical Cross -->
  <g transform="translate(320, 60)">
    <circle cx="0" cy="0" r="25" fill="#ef4444"/>
    <rect x="-5" y="-15" width="10" height="30" fill="white" rx="1"/>
    <rect x="-15" y="-5" width="30" height="10" fill="white" rx="1"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#67e8f9"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#0e7490" font-family="Arial, sans-serif" font-size="14" font-weight="bold">طبيب</text>
</svg>