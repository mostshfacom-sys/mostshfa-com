<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="medicalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#medicalBg)"/>
  
  <!-- Central Medical Cross -->
  <g transform="translate(200, 130)">
    <circle cx="0" cy="0" r="60" fill="#14b8a6"/>
    <rect x="-12" y="-40" width="24" height="80" fill="white" rx="4"/>
    <rect x="-40" y="-12" width="80" height="24" fill="white" rx="4"/>
  </g>
  
  <!-- Stethoscope -->
  <g transform="translate(80, 80)">
    <path d="M0 0 Q20 30 0 60" stroke="#0d9488" stroke-width="4" fill="none"/>
    <path d="M40 0 Q20 30 40 60" stroke="#0d9488" stroke-width="4" fill="none"/>
    <circle cx="0" cy="0" r="8" fill="#0d9488"/>
    <circle cx="40" cy="0" r="8" fill="#0d9488"/>
    <circle cx="20" cy="70" r="15" fill="#14b8a6"/>
  </g>
  
  <!-- Heart Rate -->
  <g transform="translate(280, 60)">
    <path d="M0 30 L20 30 L30 10 L40 50 L50 20 L60 30 L80 30" stroke="#ef4444" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Pills -->
  <g transform="translate(300, 180)">
    <rect x="0" y="0" width="40" height="16" fill="#f472b6" rx="8"/>
    <rect x="20" y="0" width="20" height="16" fill="#fbbf24" rx="8"/>
  </g>
  
  <g transform="translate(320, 210)">
    <rect x="0" y="0" width="35" height="14" fill="#8b5cf6" rx="7"/>
    <rect x="17" y="0" width="18" height="14" fill="#c4b5fd" rx="7"/>
  </g>
  
  <!-- Syringe -->
  <g transform="translate(60, 180) rotate(-20)">
    <rect x="0" y="0" width="60" height="15" fill="#e5e7eb" rx="2"/>
    <rect x="60" y="3" width="25" height="9" fill="#9ca3af" rx="1"/>
    <rect x="85" y="5" width="12" height="5" fill="#6b7280"/>
    <rect x="-8" y="2" width="12" height="11" fill="#d1d5db" rx="2"/>
  </g>
  
  <!-- DNA Helix -->
  <g transform="translate(330, 100)">
    <path d="M0 0 Q15 15 0 30 Q-15 45 0 60" stroke="#14b8a6" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M20 0 Q5 15 20 30 Q35 45 20 60" stroke="#14b8a6" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Heartbeat Symbol -->
  <g transform="translate(60, 120)">
    <path d="M15 5 C15 -5 0 -5 0 5 C0 15 15 25 15 25 C15 25 30 15 30 5 C30 -5 15 -5 15 5" fill="#ef4444" opacity="0.7"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#5eead4"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#0f766e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">خدمات طبية</text>
</svg>