<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="hospitalBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#bae6fd"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#hospitalBg)"/>
  
  <!-- Hospital Building -->
  <rect x="100" y="100" width="200" height="150" fill="#0284c7" rx="8"/>
  <rect x="130" y="80" width="140" height="170" fill="#0369a1" rx="4"/>
  
  <!-- Cross Symbol -->
  <rect x="175" y="100" width="50" height="15" fill="white" rx="2"/>
  <rect x="192.5" y="82.5" width="15" height="50" fill="white" rx="2"/>
  
  <!-- Windows -->
  <rect x="145" y="160" width="30" height="35" fill="#7dd3fc" rx="2"/>
  <rect x="185" y="160" width="30" height="35" fill="#7dd3fc" rx="2"/>
  <rect x="225" y="160" width="30" height="35" fill="#7dd3fc" rx="2"/>
  
  <!-- Door -->
  <rect x="175" y="200" width="50" height="50" fill="#0c4a6e" rx="4"/>
  <circle cx="215" cy="225" r="4" fill="#fbbf24"/>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#22c55e"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#0369a1" font-family="Arial, sans-serif" font-size="14" font-weight="bold">مستشفى</text>
</svg>