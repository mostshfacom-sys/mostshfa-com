<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="labBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/>
      <stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#labBg)"/>
  
  <!-- Lab Building -->
  <rect x="100" y="100" width="200" height="150" fill="#7c3aed" rx="8"/>
  
  <!-- Microscope Icon -->
  <g transform="translate(160, 110)">
    <!-- Base -->
    <rect x="10" y="100" width="60" height="10" fill="#a78bfa" rx="2"/>
    <!-- Stand -->
    <rect x="35" y="50" width="10" height="50" fill="#c4b5fd"/>
    <!-- Arm -->
    <rect x="20" y="40" width="40" height="15" fill="#c4b5fd" rx="2"/>
    <!-- Eyepiece -->
    <rect x="15" y="20" width="15" height="25" fill="#ddd6fe" rx="2"/>
    <!-- Objective -->
    <rect x="50" y="50" width="8" height="20" fill="#ddd6fe" rx="1"/>
    <!-- Stage -->
    <rect x="25" y="70" width="30" height="5" fill="#a78bfa"/>
  </g>
  
  <!-- Test Tubes -->
  <g transform="translate(260, 130)">
    <rect x="0" y="0" width="12" height="50" fill="#60a5fa" rx="6" opacity="0.8"/>
    <rect x="18" y="5" width="12" height="45" fill="#f472b6" rx="6" opacity="0.8"/>
    <rect x="36" y="2" width="12" height="48" fill="#34d399" rx="6" opacity="0.8"/>
  </g>
  
  <!-- DNA Helix -->
  <g transform="translate(100, 130)">
    <path d="M10 0 Q25 15 10 30 Q-5 45 10 60" stroke="#c4b5fd" stroke-width="3" fill="none"/>
    <path d="M30 0 Q15 15 30 30 Q45 45 30 60" stroke="#c4b5fd" stroke-width="3" fill="none"/>
    <line x1="10" y1="10" x2="30" y2="10" stroke="#ddd6fe" stroke-width="2"/>
    <line x1="10" y1="30" x2="30" y2="30" stroke="#ddd6fe" stroke-width="2"/>
    <line x1="10" y1="50" x2="30" y2="50" stroke="#ddd6fe" stroke-width="2"/>
  </g>
  
  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="#a78bfa"/>
  
  <!-- Text -->
  <text x="200" y="280" text-anchor="middle" fill="#5b21b6" font-family="Arial, sans-serif" font-size="14" font-weight="bold">معمل تحاليل</text>
</svg>