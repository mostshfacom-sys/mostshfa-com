<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="cap1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="cap2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="cap3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="cap4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect x="8" y="8" width="624" height="344" rx="16" ry="16" fill="#ffffff" opacity="0.35"/>

  <!-- Decorative capsules (no cross, no text) -->
  <g opacity="0.85">
    <g transform="translate(120,90) rotate(-18)">
      <rect x="-60" y="-14" width="120" height="28" rx="14" fill="url(#cap1)"/>
      <circle cx="-40" cy="0" r="12" fill="#ffffff" opacity="0.22"/>
    </g>
    <g transform="translate(500,120) rotate(22)">
      <rect x="-70" y="-16" width="140" height="32" rx="16" fill="url(#cap2)"/>
      <circle cx="30" cy="0" r="10" fill="#ffffff" opacity="0.25"/>
    </g>
    <g transform="translate(210,260) rotate(12)">
      <rect x="-56" y="-13" width="112" height="26" rx="13" fill="url(#cap3)"/>
      <circle cx="-20" cy="0" r="9" fill="#ffffff" opacity="0.25"/>
    </g>
    <g transform="translate(430,260) rotate(-28)">
      <rect x="-64" y="-15" width="128" height="30" rx="15" fill="url(#cap4)"/>
      <circle cx="15" cy="0" r="11" fill="#ffffff" opacity="0.2"/>
    </g>
  </g>

  <!-- Soft bubbles -->
  <g fill="#ffffff" opacity="0.28">
    <circle cx="90" cy="60" r="10"/>
    <circle cx="580" cy="80" r="8"/>
    <circle cx="540" cy="300" r="12"/>
    <circle cx="80" cy="300" r="9"/>
  </g>
</svg>
